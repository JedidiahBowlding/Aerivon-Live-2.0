# Cloud Build config for Aerivon-Live-2.0 Cloud Run deployments
#
# Deploys backend and frontend services from this repository.
#
# Required substitutions for trigger or manual build submit:
#   _PROJECT_ID: your-gcp-project-id
#   _SERVICE_ACCOUNT: service-account@project.iam.gserviceaccount.com
#   _MEMORY_BUCKET: gcs-bucket-for-agent-memory
#
substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: aerivon-live-agent
  _FRONTEND_SERVICE: aerivon-live-frontend
  _VIDEO_MODEL: veo-3.0-generate-001

steps:
  # Deploy backend API (FastAPI + WS + Veo job endpoints)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-backend
    entrypoint: bash
    args:
      - -euo
      - pipefail
      - -c
      - |
        gcloud run deploy "${_BACKEND_SERVICE}" \
          --project "${_PROJECT_ID}" \
          --region "${_REGION}" \
          --source backend \
          --allow-unauthenticated \
          --service-account "${_SERVICE_ACCOUNT}" \
          --memory 1Gi \
          --cpu 1 \
          --timeout 900 \
          --max-instances 3 \
          --min-instances 0 \
          --execution-environment gen2 \
          --session-affinity \
          --set-env-vars "GOOGLE_GENAI_USE_VERTEXAI=True,GOOGLE_CLOUD_PROJECT=${_PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},AERIVON_MEMORY_BUCKET=${_MEMORY_BUCKET},AERIVON_VIDEO_MODEL=${_VIDEO_MODEL},AERIVON_LIVE_MAX_OUTPUT_TOKENS=2500" \
          --quiet

  # Resolve backend URL and deploy frontend with API endpoint baked as env var
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-frontend
    entrypoint: bash
    args:
      - -euo
      - pipefail
      - -c
      - |
        BACKEND_URL="$(gcloud run services describe "${_BACKEND_SERVICE}" --project "${_PROJECT_ID}" --region "${_REGION}" --format='value(status.url)')"

        gcloud run deploy "${_FRONTEND_SERVICE}" \
          --project "${_PROJECT_ID}" \
          --region "${_REGION}" \
          --source frontend \
          --allow-unauthenticated \
          --memory 512Mi \
          --cpu 1 \
          --timeout 600 \
          --max-instances 3 \
          --min-instances 0 \
          --set-build-env-vars "VITE_AERIVON_API_URL=$${BACKEND_URL},VITE_AERIVON_WS_URL=$${BACKEND_URL/https:\/\//wss:\/\/}/ws/story" \
          --set-env-vars "VITE_AERIVON_API_URL=$${BACKEND_URL},VITE_AERIVON_WS_URL=$${BACKEND_URL/https:\/\//wss:\/\/}/ws/story" \
          --quiet

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
